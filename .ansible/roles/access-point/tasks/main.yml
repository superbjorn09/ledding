---
- name: Set hostname to {{ hostname }}
  hostname:
    name: "{{ hostname }}"

- name: Unblock Wifi on rfkill Service
  shell: rfkill unblock wifi

- name: Install required software packages
  apt:
    pkg:
      - hostapd
      - iptables-persistent
      - dnsmasq

- name: Mark {{ wifi_adapter }} as unmanaged in NetworkManager
  template:
    src: templates/nm-unmanaged-wlan.conf.j2
    dest: /etc/NetworkManager/conf.d/99-unmanaged-wlan.conf

- name: Configure static IP for {{ wifi_adapter }} via systemd-networkd
  template:
    src: templates/wlan-static.network.j2
    dest: /etc/systemd/network/10-{{ wifi_adapter }}.network

- name: Enable and start systemd-networkd
  systemd:
    name: systemd-networkd
    state: restarted
    enabled: yes

- name: Configure static LAN IP via NetworkManager
  template:
    src: templates/lan-static.nmconnection.j2
    dest: /etc/NetworkManager/system-connections/{{ lan_adapter }}.nmconnection
    mode: '0600'
  when: lan_static.enabled

- name: Configure hostapd
  template:
    src: templates/hostapd.conf.j2
    dest: /etc/hostapd/hostapd.conf

- name: Configure dnsmasq for access point DHCP
  template:
    src: templates/dnsmasq-ap.conf.j2
    dest: /etc/dnsmasq.d/access-point.conf

- name: Enable IP forwarding
  sysctl:
    name: "net.ipv4.ip_forward"
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Disable ipv6
  sysctl:
    name: "net.ipv6.conf.all.disable_ipv6"
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes

- name: Setup iptables rules (1/3)
  iptables:
    state: present
    table: nat
    chain: POSTROUTING
    out_interface: "{{ lan_adapter }}"
    jump: MASQUERADE

- name: Setup iptables rules (2/3)
  iptables:
    state: present
    chain: FORWARD
    in_interface: "{{ lan_adapter }}"
    out_interface: "{{ wifi_adapter }}"
    ctstate: RELATED,ESTABLISHED
    jump: ACCEPT

- name: Setup iptables rules (3/3)
  iptables:
    state: present
    chain: FORWARD
    in_interface: "{{ wifi_adapter }}"
    out_interface: "{{ lan_adapter }}"
    jump: ACCEPT

- name: Install iptables rules
  template:
    src: templates/rules.{{ item }}.j2
    dest: /etc/iptables/rules.{{ item }}
  with_items:
    - v4
    - v6

- name: Load new iptables rules
  shell: "{{ item }}"
  with_items:
    - iptables-restore < /etc/iptables/rules.v4
    - ip6tables-restore < /etc/iptables/rules.v6

- name: Restart NetworkManager
  systemd:
    name: NetworkManager
    state: restarted

- name: Restart dnsmasq
  systemd:
    name: dnsmasq
    state: restarted
    enabled: yes

- name: Unmask and enable hostapd
  systemd:
    name: hostapd
    masked: no
    state: restarted
    enabled: yes
