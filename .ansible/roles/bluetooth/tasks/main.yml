---
- name: Installing Bluetooth and PipeWire packages
  apt:
    pkg:
      - bluez
      - bluez-tools
      - pipewire
      - pipewire-pulse
      - pipewire-audio
      - wireplumber
      - libspa-0.2-bluetooth

- name: Enabling Bluetooth service
  systemd:
    name: bluetooth.service
    enabled: yes
    state: started

- name: Deploying BlueZ configuration
  template:
    src: templates/main.conf
    dest: /etc/bluetooth/main.conf
  notify: Restart Bluetooth

- name: Deploying Bluetooth PIN file
  template:
    src: templates/pin.conf
    dest: /etc/bluetooth/pin.conf
    mode: "0644"

- name: Installing Python D-Bus dependencies
  apt:
    pkg:
      - python3-dbus
      - python3-gi

- name: Deploying Bluetooth auto-accept agent
  template:
    src: templates/bt-auto-accept.sh
    dest: /usr/local/bin/bt-auto-accept.sh
    mode: "0755"

- name: Deploying Bluetooth pairing agent
  template:
    src: templates/ledding-bt-agent.py
    dest: /usr/local/bin/ledding-bt-agent.py
    mode: "0755"

- name: Deploying Bluetooth agent service
  template:
    src: templates/bt-agent.service
    dest: /etc/systemd/system/bt-agent.service
  notify: Restart Bluetooth agent

- name: Enabling Bluetooth agent service
  systemd:
    name: bt-agent.service
    enabled: yes
    state: started
    daemon_reload: yes

- name: Removing seat-monitoring dependency from WirePlumber Bluetooth monitor
  replace:
    path: /usr/share/wireplumber/wireplumber.conf
    regexp: '(\s+)wants = \[ monitor\.bluez\.seat-monitoring \]'
    replace: '\1# wants = [ monitor.bluez.seat-monitoring ]'

- name: Deploying WirePlumber post-upgrade fix script
  template:
    src: templates/fix-wireplumber.sh
    dest: /usr/local/bin/fix-wireplumber.sh
    mode: "0755"

- name: Deploying apt hook to reapply WirePlumber patch after upgrades
  copy:
    content: 'DPkg::Post-Invoke { "/usr/local/bin/fix-wireplumber.sh"; };'
    dest: /etc/apt/apt.conf.d/99-wireplumber-fix

- name: Deploying WirePlumber Bluetooth autoconnect config
  copy:
    src: templates/51-bluez-autoconnect.conf
    dest: /etc/wireplumber/wireplumber.conf.d/51-bluez-autoconnect.conf
  notify: Restart WirePlumber

- name: Enabling user lingering for PipeWire
  command: loginctl enable-linger {{ deploy_user }}
  args:
    creates: /var/lib/systemd/linger/{{ deploy_user }}

- name: Creating user systemd directory
  file:
    path: /home/{{ deploy_user }}/.config/systemd/user
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"

- name: Deploying volume init service
  copy:
    src: templates/set-volume.service
    dest: /home/{{ deploy_user }}/.config/systemd/user/set-volume.service

- name: Enabling volume init service
  become_user: "{{ deploy_user }}"
  systemd:
    name: set-volume.service
    scope: user
    enabled: yes
    daemon_reload: yes
  environment:
    XDG_RUNTIME_DIR: "/run/user/1000"

- name: Enabling PipeWire user services
  become_user: "{{ deploy_user }}"
  systemd:
    name: "{{ item }}"
    scope: user
    enabled: yes
    state: started
  environment:
    XDG_RUNTIME_DIR: "/run/user/1000"
  loop:
    - pipewire.service
    - pipewire-pulse.service
    - wireplumber.service
