<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ledding Control</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💡</text></svg>">
    <style>
        body { font-family: sans-serif; max-width: 960px; margin: 20px auto; padding: 0 10px; }
        h1 { font-size: 1.4em; }
        h2 { font-size: 1.1em; margin-top: 1.5em; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
        button {
            padding: 10px 16px; font-size: 1em; border: 1px solid #ccc;
            border-radius: 4px; cursor: pointer; background: #f5f5f5;
        }
        button:active { background: #ddd; }
        button.on { background: #4CAF50; color: white; border-color: #4CAF50; }
        button.off { background: #f44336; color: white; border-color: #f44336; }
        button.toggle-on { background: #2196F3; color: white; border-color: #2196F3; }
        button.effect-active { background: #FF9800; color: white; border-color: #FF9800; }
        .slider-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .slider-row input { flex: 1; }
        .slider-row span { min-width: 3em; text-align: right; }
        #status { color: #666; margin-top: 1em; font-size: 0.9em; }
        #led-strip {
            display: none;
            margin-top: 12px;
            background: #111;
            border-radius: 6px;
            padding: 8px;
            overflow-x: auto;
        }
        #led-strip.active { display: block; }
        #led-canvas {
            width: 100%;
            height: 60px;
            display: block;
        }
        .effect-cfg { display: none; }
        .effect-cfg.active { display: block; }
        .swatch {
            width: 36px; height: 36px; padding: 0; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer;
        }
        .swatch.selected { border-color: #333; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333; }
        select { padding: 8px 12px; font-size: 1em; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Ledding Control</h1>

    <h2>Effect</h2>
    <div class="slider-row">
        <select id="pi-mode" onchange="setPiMode(this.value)">
            <option value="fft">FFT (Audio)</option>
            <option value="bolt">Bolt</option>
            <option value="bounce">Bounce</option>
            <option value="breathe">Breathe</option>
            <option value="comet">Comet</option>
            <option value="fire">Fire</option>
            <option value="matrix">Matrix</option>
            <option value="meteor">Meteor</option>
            <option value="rainbow">Rainbow</option>
            <option value="segments">Segments</option>
            <option value="sparkle">Sparkle</option>
            <option value="static">Static</option>
            <option value="strobe">Strobe</option>
            <option value="twinkle">Twinkle</option>
            <option value="wipe">Wipe</option>
        </select>
    </div>
    <div id="effect-params">
        <div class="effect-cfg" data-effect="static">
            <div class="slider-row">
                <label>Brightness:</label>
                <input type="range" min="0" max="253" step="1" value="253"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('static','brightness',parseInt(this.value))">
                <span>253</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="bolt">
            <div class="slider-row">
                <label>Speed:</label>
                <input type="range" min="0.5" max="15" step="0.5" value="3"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('bolt','speed',parseFloat(this.value))">
                <span>3</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="strobe">
            <div class="slider-row">
                <label>Rate (Hz):</label>
                <input type="range" min="1" max="20" step="0.5" value="5"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('strobe','rate',parseFloat(this.value))">
                <span>5</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="sparkle">
            <div class="slider-row">
                <label>Density:</label>
                <input type="range" min="1" max="30" step="1" value="8"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('sparkle','spawn_rate',parseInt(this.value))">
                <span>8</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="meteor">
            <div class="slider-row">
                <label>Speed:</label>
                <input type="range" min="1" max="8" step="1" value="2"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('meteor','speed',parseInt(this.value))">
                <span>2</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="rainbow">
            <div class="slider-row">
                <label>Speed:</label>
                <input type="range" min="0.5" max="10" step="0.5" value="2"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('rainbow','speed',parseFloat(this.value))">
                <span>2</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="fire">
            <div class="slider-row">
                <label>Sparking:</label>
                <input type="range" min="50" max="200" step="5" value="120"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('fire','sparking',parseInt(this.value))">
                <span>120</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="breathe">
            <div class="slider-row">
                <label>Speed:</label>
                <input type="range" min="0.2" max="3" step="0.1" value="1"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('breathe','speed',parseFloat(this.value))">
                <span>1</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="comet">
            <div class="slider-row">
                <label>Speed:</label>
                <input type="range" min="1" max="10" step="0.5" value="4"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('comet','speed',parseFloat(this.value))">
                <span>4</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="matrix">
            <div class="slider-row">
                <label>Density:</label>
                <input type="range" min="5" max="50" step="5" value="15"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('matrix','spawn_chance',parseInt(this.value))">
                <span>15</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="wipe">
            <div class="slider-row">
                <label>Speed:</label>
                <input type="range" min="1" max="15" step="1" value="5"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('wipe','speed',parseFloat(this.value))">
                <span>5</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="twinkle">
            <div class="slider-row">
                <label>Stars:</label>
                <input type="range" min="10" max="100" step="5" value="40"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('twinkle','density',parseInt(this.value))">
                <span>40</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="bounce">
            <div class="slider-row">
                <label>Size:</label>
                <input type="range" min="3" max="20" step="1" value="8"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('bounce','size',parseInt(this.value))">
                <span>8</span>
            </div>
        </div>
        <div class="effect-cfg" data-effect="segments">
            <div class="slider-row">
                <label>Segments:</label>
                <input type="range" min="2" max="16" step="2" value="6"
                       oninput="this.nextElementSibling.textContent=this.value"
                       onchange="setEffectParam('segments','segment_count',parseInt(this.value))">
                <span>6</span>
            </div>
        </div>
    </div>
    <div id="color-controls" style="display:none;">
        <div class="btn-group" id="color-swatches">
            <button class="swatch" style="background:#ff0000" onclick="pickColor(0,100)" title="Red"></button>
            <button class="swatch" style="background:#ff8000" onclick="pickColor(30,100)" title="Orange"></button>
            <button class="swatch" style="background:#ffff00" onclick="pickColor(60,100)" title="Yellow"></button>
            <button class="swatch" style="background:#00ff00" onclick="pickColor(120,100)" title="Green"></button>
            <button class="swatch" style="background:#00bfff" onclick="pickColor(195,100)" title="Cyan"></button>
            <button class="swatch" style="background:#0040ff" onclick="pickColor(225,100)" title="Blue"></button>
            <button class="swatch" style="background:#8000ff" onclick="pickColor(270,100)" title="Purple"></button>
            <button class="swatch" style="background:#ff00ff" onclick="pickColor(300,100)" title="Pink"></button>
            <button class="swatch" style="background:#ffffff;border:1px solid #ccc" onclick="pickColor(0,0)" title="White"></button>
            <button id="btn-autocolor" onclick="toggleAutoColor()">Auto</button>
        </div>
    </div>

    <div class="fft-only">
    <h2>FFT</h2>
    <div class="btn-group">
        <button class="on" onclick="post('/fft/start')">Start</button>
        <button class="off" onclick="post('/fft/stop')">Stop</button>
    </div>
    <div class="slider-row">
        <label>Exponent:</label>
        <input type="range" min="0.5" max="5.0" step="0.1" id="exponent"
               oninput="document.getElementById('exp-val').textContent=this.value"
               onchange="post('/fft/params', {exponent: parseFloat(this.value)})">
        <span id="exp-val"></span>
        <button onclick="document.getElementById('exponent').value=2.5;document.getElementById('exp-val').textContent='2.5';post('/fft/params',{exponent:2.5})">Reset</button>
    </div>

    <h2>Rendering</h2>
    <div class="btn-group">
        <button id="btn-smooth" onclick="toggleSmooth()">Smoothing</button>
        <button id="btn-peaks" onclick="togglePeaks()">Peak Hold</button>
    </div>
    <div class="slider-row">
        <label>Freq Range:</label>
        <input type="range" min="4000" max="16000" step="500" id="freq-max"
               oninput="document.getElementById('freq-val').textContent=this.value + ' Hz'"
               onchange="post('/fft/params', {freq_max: parseInt(this.value)})">
        <span id="freq-val"></span>
        <button onclick="document.getElementById('freq-max').value=6000;document.getElementById('freq-val').textContent='6000 Hz';post('/fft/params',{freq_max:6000})">Reset</button>
    </div>

    <h2>Bass Effect</h2>
    <div class="btn-group" id="bass-buttons">
        <button id="bass-off" onclick="setBass('off')">Off</button>
        <button id="bass-flash" onclick="setBass('flash')">Flash</button>
        <button id="bass-pulse" onclick="setBass('pulse')">Pulse</button>
        <button id="bass-wave" onclick="setBass('wave')">Wave</button>
    </div>
    <div class="slider-row">
        <label>Threshold:</label>
        <input type="range" min="20" max="200" step="5" id="bass-threshold"
               oninput="document.getElementById('thresh-val').textContent=this.value"
               onchange="post('/bass/params', {threshold: parseInt(this.value)})">
        <span id="thresh-val"></span>
        <button onclick="document.getElementById('bass-threshold').value=80;document.getElementById('thresh-val').textContent='80';post('/bass/params',{threshold:80})">Reset</button>
    </div>
    </div>

    <h2>LED Debug</h2>
    <div class="btn-group">
        <button id="debug-btn" onclick="toggleDebug()">Show LEDs</button>
    </div>
    <div id="led-strip">
        <canvas id="led-canvas"></canvas>
    </div>

    <div id="esp32-controls" style="display:none;">
    <h2>ESP32 Mode</h2>
    <div class="btn-group">
        <button onclick="cmd('prev_mode')">&#9664; Prev</button>
        <button onclick="cmd('next_mode')">Next &#9654;</button>
    </div>

    <h2>Brightness</h2>
    <div class="btn-group">
        <button onclick="cmd('dec_brightness')">&#8722;</button>
        <button onclick="cmd('inc_brightness')">+</button>
    </div>

    <h2>Color</h2>
    <div class="btn-group">
        <button onclick="cmd('prev_color')">&#9664; Prev</button>
        <button onclick="cmd('next_color')">Next &#9654;</button>
    </div>

    <h2>Intensity</h2>
    <div class="btn-group">
        <button onclick="cmd('dec_intensity')">&#8722;</button>
        <button onclick="cmd('inc_intensity')">+</button>
    </div>
    </div>

    <div id="status"></div>

    <script>
        let currentPiMode = 'fft';
        let debugActive = false;
        let debugInterval = null;
        let currentBassEffect = 'off';
        let smoothActive = false;
        let peaksActive = false;

        function getToken() {
            return localStorage.getItem('ledding_token') || '';
        }

        function post(url, data) {
            var headers = {'Content-Type': 'application/json'};
            var token = getToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;
            fetch(url, {
                method: 'POST',
                headers: headers,
                body: data ? JSON.stringify(data) : ''
            }).then(r => {
                if (r.status === 401) {
                    var t = prompt('Enter access token:');
                    if (t) { localStorage.setItem('ledding_token', t); post(url, data); }
                    return r.json();
                }
                return r.json();
            }).then(r => {
                if (r) document.getElementById('status').textContent = r.status || '';
            });
        }
        function cmd(name) {
            post('/esp/command', {command: name});
        }

        function setBass(mode) {
            currentBassEffect = mode;
            post('/bass/effect', {effect: mode});
            updateBassButtons();
        }

        function updateBassButtons() {
            ['off', 'flash', 'pulse', 'wave'].forEach(m => {
                const btn = document.getElementById('bass-' + m);
                if (m === currentBassEffect) {
                    btn.classList.add('effect-active');
                } else {
                    btn.classList.remove('effect-active');
                }
            });
        }

        function setPiMode(mode) {
            currentPiMode = mode;
            post('/pi/mode', {mode: mode});
            document.querySelectorAll('.fft-only').forEach(function(el) {
                el.style.display = mode === 'fft' ? '' : 'none';
            });
            document.querySelectorAll('.effect-cfg').forEach(function(el) {
                el.classList.toggle('active', el.dataset.effect === mode);
            });
            document.getElementById('color-controls').style.display = mode === 'fft' ? 'none' : '';
        }

        function pickColor(hue, sat) {
            setEffectParam(currentPiMode, 'hue', hue);
            setEffectParam(currentPiMode, 'saturation', sat);
            setEffectParam(currentPiMode, 'auto_color', false);
            document.getElementById('btn-autocolor').classList.remove('toggle-on');
            updateSwatchSelection(hue, sat);
        }

        function updateSwatchSelection(hue, sat) {
            document.querySelectorAll('.swatch').forEach(function(el) { el.classList.remove('selected'); });
            var swatches = document.querySelectorAll('.swatch');
            for (var i = 0; i < swatches.length; i++) {
                var oc = swatches[i].getAttribute('onclick') || '';
                if (oc.indexOf('pickColor('+hue+','+sat+')') >= 0) {
                    swatches[i].classList.add('selected');
                    break;
                }
            }
        }

        function toggleAutoColor() {
            var btn = document.getElementById('btn-autocolor');
            var isOn = btn.classList.toggle('toggle-on');
            setEffectParam(currentPiMode, 'auto_color', isOn);
            if (isOn) {
                document.querySelectorAll('.swatch').forEach(function(el) { el.classList.remove('selected'); });
            }
        }

        function setEffectParam(effect, param, value) {
            var data = {mode: effect};
            data[param] = value;
            post('/pi/effect_params', data);
        }

        function toggleSmooth() {
            smoothActive = !smoothActive;
            const btn = document.getElementById('btn-smooth');
            if (smoothActive) {
                btn.classList.add('toggle-on');
                post('/fft/params', {smoothing: 0.7});
            } else {
                btn.classList.remove('toggle-on');
                post('/fft/params', {smoothing: 0.0});
            }
        }

        function togglePeaks() {
            peaksActive = !peaksActive;
            const btn = document.getElementById('btn-peaks');
            if (peaksActive) {
                btn.classList.add('toggle-on');
                post('/fft/params', {peak_decay: 0.95});
            } else {
                btn.classList.remove('toggle-on');
                post('/fft/params', {peak_decay: 0.0});
            }
        }

        function toggleDebug() {
            debugActive = !debugActive;
            const btn = document.getElementById('debug-btn');
            const strip = document.getElementById('led-strip');
            if (debugActive) {
                btn.textContent = 'Hide LEDs';
                btn.classList.add('toggle-on');
                strip.classList.add('active');
                post('/debug/on');
                debugInterval = setInterval(fetchLevels, 50);
            } else {
                btn.textContent = 'Show LEDs';
                btn.classList.remove('toggle-on');
                strip.classList.remove('active');
                post('/debug/off');
                clearInterval(debugInterval);
                debugInterval = null;
            }
        }

        function fetchLevels() {
            fetch('/debug/levels').then(r => r.json()).then(data => {
                drawLeds(data.levels || [], data.hue || 0, data.saturation || 100, data.mode || 'fft');
            });
        }

        function drawLeds(levels, effectHue, effectSat, mode) {
            const canvas = document.getElementById('led-canvas');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;

            canvas.width = canvas.clientWidth * dpr;
            canvas.height = canvas.clientHeight * dpr;
            ctx.scale(dpr, dpr);

            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            const n = levels.length || 1;
            const ledW = w / n;

            ctx.clearRect(0, 0, w, h);

            for (let i = 0; i < levels.length; i++) {
                const v = Math.min(levels[i] / 253, 1);
                let hue, sat, lum;
                if (mode === 'fft') {
                    hue = 120 - v * 120;
                    sat = 100;
                    lum = v * 50;
                } else {
                    hue = effectHue;
                    sat = effectSat;
                    lum = v * 50;
                }
                ctx.fillStyle = 'hsl(' + hue + ', ' + sat + '%, ' + lum + '%)';
                ctx.fillRect(i * ledW, h * (1 - v), ledW - 0.5, h * v);
            }
        }

        // load current state on page load
        fetch('/status').then(r => r.json()).then(s => {
            document.getElementById('exponent').value = s.exponent;
            document.getElementById('exp-val').textContent = s.exponent;
            document.getElementById('bass-threshold').value = s.bass_threshold;
            document.getElementById('thresh-val').textContent = s.bass_threshold;
            document.getElementById('freq-max').value = s.freq_max;
            document.getElementById('freq-val').textContent = s.freq_max + ' Hz';
            currentBassEffect = s.bass_effect;
            updateBassButtons();
            if (s.smoothing > 0) {
                smoothActive = true;
                document.getElementById('btn-smooth').classList.add('toggle-on');
            }
            if (s.peak_decay > 0) {
                peaksActive = true;
                document.getElementById('btn-peaks').classList.add('toggle-on');
            }
            if (s.pi_mode) {
                document.getElementById('pi-mode').value = s.pi_mode;
                setPiMode(s.pi_mode);
            }
            if (s.serial_connected) {
                document.getElementById('esp32-controls').style.display = '';
            }
            if (s.debug_enabled) {
                toggleDebug();
            }
        });
    </script>
</body>
</html>
